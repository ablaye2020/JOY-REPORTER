<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING•REDIX√SA¹⁰ - Mass Reporter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: #ff0000;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            text-align: center;
            width: 500px;
        }

        .king-name {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .whatsapp-link {
            background: #075E54;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
            font-size: 14px;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            font-size: 11px;
            color: #ff8888;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .double-boutons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .btn-signal {
            background: #ff0000;
            color: black;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            border-radius: 8px;
        }

        .btn-deban {
            background: #00aa00;
            color: black;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            border-radius: 8px;
        }

        .btn-signal:hover { background: #cc0000; }
        .btn-deban:hover { background: #008800; }

        button:disabled {
            background: #440000;
            cursor: not-allowed;
        }

        #status {
            margin: 20px 0;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 13px;
            color: #00ff00;
        }

        .joyboy {
            margin-top: 20px;
            font-size: 11px;
            color: #ff6666;
            border-top: 1px solid #ff0000;
            padding-top: 15px;
        }

        .footer-text {
            font-size: 9px;
            margin-top: 10px;
            color: #440000;
        }

        .compteur {
            font-size: 12px;
            color: #ffaa00;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="king-name">𝐊𝐈𝐍𝐆•𝐑𝐄𝐃𝐈𝐗√𝐒𝐀¹⁰</div>
        <div class="subtitle">WHATSAPP MASS REPORTER</div>
        
        <a href="https://whatsapp.com/channel/0029VbBGPvF8aKvKN8YQft2d" class="whatsapp-link" target="_blank" id="whatsappLink">
            📱 REJOINDRE LA CHAÎNE WHATSAPP
        </a>
        
        <div class="input-group">
            <label>📱 TON NUMÉRO WHATSAPP (pour vérifier l'abonnement)</label>
            <input type="text" id="numAbonne" placeholder="+33XXXXXXXXX">
        </div>
        
        <div class="input-group">
            <label>📞 NUMÉRO À SIGNALER / DÉBAN</label>
            <input type="text" id="numero" placeholder="+33XXXXXXXXX">
        </div>
        
        <div class="double-boutons">
            <button class="btn-signal" onclick="verifierEtLancer('signal')">🔴 SIGNALER 50x</button>
            <button class="btn-deban" onclick="verifierEtLancer('deban')">🟢 DÉBAN 50x</button>
        </div>
        
        <div id="status">⚡ PRÊT ⚡</div>
        <div id="compteur" class="compteur"></div>
        
        <div class="joyboy">BY JOYBOY</div>
        <div class="footer-text">⚡ Système de signalement rapide - Le respect ne se demande pas ⚡</div>
    </div>

    <script>
        // 🔊 SON AVEC TON FICHIER ma_musique.mp3.m4a
        let sonJoue = false;
        const son = new Audio('ma_musique.mp3.m4a');
        
        function jouerSon() {
            if(sonJoue) return;
            sonJoue = true;
            son.play().catch(e => console.log("Son bloqué par navigateur"));
        }
        
        let compteARebours = false;
        let actionEnCours = null;
        
        function verifierEtLancer(action) {
            // JOUER LE SON
            jouerSon();
            
            const numAbonne = document.getElementById('numAbonne').value.trim();
            const numero = document.getElementById('numero').value.trim();
            
            if(!numAbonne || numAbonne.length < 10) {
                alert("❌ Entre ton numéro WhatsApp pour vérifier l'abonnement !");
                return;
            }
            
            if(!numero || numero.length < 10) {
                alert("❌ Numéro à signaler/déban invalide !");
                return;
            }
            
            if(compteARebours) {
                alert("⏳ Un envoi est déjà en cours !");
                return;
            }
            
            actionEnCours = action;
            const boutons = document.querySelectorAll('.btn-signal, .btn-deban');
            boutons.forEach(b => b.disabled = true);
            
            document.getElementById('status').innerHTML = "🔍 VÉRIFICATION DE L'ABONNEMENT... 🔍";
            document.getElementById('status').style.color = "#ffaa00";
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = "✅ ABONNEMENT VÉRIFIÉ ! DÉMARRAGE DANS 30 SECONDES... ✅";
                document.getElementById('status').style.color = "#00ff00";
                
                let tempsRestant = 30;
                const compteurDiv = document.getElementById('compteur');
                
                const interval = setInterval(() => {
                    tempsRestant--;
                    compteurDiv.innerHTML = `⏳ ENVOI DANS ${tempsRestant} SECONDES... ⏳`;
                    
                    if(tempsRestant <= 0) {
                        clearInterval(interval);
                        compteurDiv.innerHTML = "";
                        lancerSignalement(actionEnCours, numero);
                    }
                }, 1000);
            }, 2000);
        }
        
        async function lancerSignalement(action, numero) {
            const statusDiv = document.getElementById('status');
            const boutons = document.querySelectorAll('.btn-signal, .btn-deban');
            
            statusDiv.innerHTML = `⚡ ENVOI 50x ${action === 'signal' ? 'SIGNALEMENTS' : 'DÉBANS'} EN PARALLÈLE... ⚡`;
            statusDiv.style.color = "#ffaa00";

            const promesses = [];
            for(let i = 1; i <= 50; i++) {
                promesses.push(
                    fetch('/api/signal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numero: numero, index: i, action: action })
                    })
                    .then(res => res.ok ? 'ok' : 'fail')
                    .catch(() => 'fail')
                );
            }

            const resultats = await Promise.all(promesses);
            const reussis = resultats.filter(r => r === 'ok').length;
            
            statusDiv.innerHTML = `✅ ${reussis}/50 ${action === 'signal' ? 'SIGNALEMENTS' : 'DÉBANS'} ENVOYÉS ! ✅`;
            statusDiv.style.color = "#00ff00";
            boutons.forEach(b => b.disabled = false);
            compteARebours = false;
            document.getElementById('compteur').innerHTML = "";
        }
    </script>
</body>
</html>
