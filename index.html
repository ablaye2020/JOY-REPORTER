<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Reporter - Joyboy</title>
    <style>
        body {
            background: #0a0a0a;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #ff0000;
            text-align: center;
            width: 400px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            background: #222;
            border: 1px solid #ff0000;
            color: white;
            font-size: 16px;
        }
        button {
            background: #ff0000;
            color: black;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #cc0000;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #00ff00;
        }
        .quote {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ WHATSAPP MASS REPORTER ⚡</h1>
        <p>Numéro à signaler :</p>
        <input type="text" id="numero" placeholder="+33XXXXXXXXX" value="+33612345678">
        <button onclick="lancerSignalement()">LANCER 50 SIGNALEMENTS</button>
        <div id="status">Prêt</div>
        <div class="quote">"Le respect ne se demande pas" - Joyboy</div>
    </div>

    <script>
        async function lancerSignalement() {
            const numero = document.getElementById('numero').value;
            if(!numero || numero.length < 10) {
                alert("Numéro invalide !");
                return;
            }

            document.getElementById('status').innerHTML = "⏳ Envoi en cours... (0/50)";
            document.querySelector('button').disabled = true;

            for(let i = 1; i <= 50; i++) {
                try {
                    const response = await fetch('/api/signal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numero: numero, index: i })
                    });
                    document.getElementById('status').innerHTML = `📤 Envoi ${i}/50...`;
                    await new Promise(r => setTimeout(r, 2000)); // pause 2 secondes
                } catch(e) {
                    console.error(e);
                }
            }
            document.getElementById('status').innerHTML = "✅ 50 signalements envoyés !";
            document.querySelector('button').disabled = false;
        }
    </script>
</body>
</html>
