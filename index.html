<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING•REDIX√SA¹⁰ - Mass Reporter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: #ff0000;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            text-align: center;
            width: 500px;
            backdrop-filter: blur(5px);
        }

        .king-name {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff0000;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #ff0000;
        }

        .subtitle {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ff0000;
            display: inline-block;
            padding-bottom: 5px;
        }

        .whatsapp-link {
            background: #075E54;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .whatsapp-link:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        .abonnement-requis {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-size: 12px;
            color: #ff8888;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            font-family: monospace;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        button {
            background: #ff0000;
            color: black;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        button:disabled {
            background: #440000;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin: 20px 0;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 13px;
            color: #00ff00;
            font-family: monospace;
        }

        .joyboy {
            margin-top: 20px;
            font-size: 11px;
            color: #ff6666;
            text-align: center;
            letter-spacing: 1px;
            border-top: 1px solid #ff0000;
            padding-top: 15px;
        }

        .footer-text {
            font-size: 9px;
            margin-top: 10px;
            color: #440000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="king-name">𝐊𝐈𝐍𝐆•𝐑𝐄𝐃𝐈𝐗√𝐒𝐀¹⁰</div>
        <div class="subtitle">WHATSAPP MASS REPORTER</div>
        
        <a href="https://whatsapp.com/channel/0029VbBGPvF8aKvKN8YQft2d" class="whatsapp-link" target="_blank">
            📱 REJOINDRE LA CHAÎNE WHATSAPP
        </a>
        
        <div class="abonnement-requis">
            ⚠️ VOUS DEVEZ ÊTRE ABONNÉ À LA CHAÎNE POUR SIGNALER ⚠️
        </div>
        
        <input type="text" id="numero" placeholder="📞 Numéro à signaler (+33XXXXXXXXX)">
        
        <button onclick="verifierEtLancer()">🚀 LANCER 50 SIGNALEMENTS 🚀</button>
        
        <div id="status">⚡ PRÊT ⚡</div>
        
        <div class="joyboy">BY JOYBOY</div>
        <div class="footer-text">⚡ Système de signalement rapide - Le respect ne se demande pas ⚡</div>
    </div>

    <script>
        // 🔊 SON AU PREMIER CLIC
let sonJoue = false;
const son = new Audio('ma_musique.mp3.m4a');  // ← REMPLACE PAR LE NOM DE TON FICHIER

function jouerSon() {
    if(sonJoue) return;
    sonJoue = true;
    son.play().catch(e => console.log("Son bloqué"));
}
        
        // VÉRIFICATION ABONNEMENT WHATSAPP
        let aVisiteWhatsApp = false;
        const LIEN_WHATSAPP = "https://whatsapp.com/channel/..."; // 🔁 REMPLACE PAR TON LIEN
        
        window.addEventListener('focus', function() {
            if(document.hidden === false) {
                aVisiteWhatsApp = true;
                document.getElementById('status').innerHTML = "✅ Abonnement vérifié ! Vous pouvez signaler ✅";
                document.getElementById('status').style.color = "#00ff00";
            }
        });
        
        function verifierEtLancer() {
            // JOUER LE SON AU PREMIER CLIC
            jouerSon();
            
            if(!aVisiteWhatsApp) {
                window.open(LIEN_WHATSAPP, '_blank');
                document.getElementById('status').innerHTML = "📱 REJOIGNEZ LA CHAÎNE PUIS REVENEZ ICI 📱";
                document.getElementById('status').style.color = "#ffaa00";
                return;
            }
            
            lancerSignalement();
        }
        
        async function lancerSignalement() {
            const numero = document.getElementById('numero').value.trim();
            
            if(!numero || numero.length < 10) {
                alert("❌ Numéro invalide ! Format: +33XXXXXXXXX");
                return;
            }

            const statusDiv = document.getElementById('status');
            const bouton = document.querySelector('button');
            
            statusDiv.innerHTML = "⚡ ENVOI DES 50 SIGNALEMENTS EN PARALLÈLE... ⚡";
            statusDiv.style.color = "#ffaa00";
            bouton.disabled = true;

            const promesses = [];
            for(let i = 1; i <= 50; i++) {
                promesses.push(
                    fetch('/api/signal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numero: numero, index: i })
                    })
                    .then(res => res.ok ? 'ok' : 'fail')
                    .catch(() => 'fail')
                );
            }

            const resultats = await Promise.all(promesses);
            const reussis = resultats.filter(r => r === 'ok').length;
            
            if(reussis === 50) {
                statusDiv.innerHTML = `✅ ${reussis}/50 SIGNALEMENTS ENVOYÉS ! ✅`;
                statusDiv.style.color = "#00ff00";
            } else {
                statusDiv.innerHTML = `⚠️ ${reussis}/50 RÉUSSIS - ${50-reussis} ÉCHECS ⚠️`;
                statusDiv.style.color = "#ffaa00";
            }
            
            bouton.disabled = false;
        }
    </script>
</body>
</html>
