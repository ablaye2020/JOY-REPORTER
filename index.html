JOYBOY LE RESPECT NE SE DEMANDE PAS 
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYBOY REPORTER - Denúncia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0000 0%, #000000 100%);
            color: #ff0000;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            text-align: center;
            width: 500px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff0000;
        }

        .subtitle {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .whatsapp-link {
            background: #075E54;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .whatsapp-link:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        .abonnement-requis {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-size: 12px;
            color: #ff8888;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            text-align: center;
        }

        button {
            background: #ff0000;
            color: black;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            border-radius: 8px;
            margin: 10px 0;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        button:disabled {
            background: #440000;
            cursor: not-allowed;
        }

        .btn-music {
            background: #660066;
            color: #ff66ff;
            border: 1px solid #ff66ff;
        }

        .btn-music:hover {
            background: #990099;
        }

        #status {
            margin: 20px 0;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 13px;
            color: #00ff00;
        }

        .quote {
            margin-top: 20px;
            font-size: 11px;
            color: #ff6666;
            border-top: 1px solid #ff0000;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ JOYBOY REPORTER ⚔️</h1>
        <div class="subtitle">DENÚNCIA OFICIAL</div>

        <!-- Botões música -->
        <button class="btn-music" onclick="jogarMusica()">🎵 TOCAR MÚSICA 🎵</button>
        <button class="btn-music" onclick="pausarMusica()">⏸️ PAUSAR</button>

        <!-- Link canal WhatsApp -->
        <a href="https://whatsapp.com/channel/..." class="whatsapp-link" target="_blank" id="whatsappLink">
            📱 ENTRAR NO CANAL WHATSAPP
        </a>

        <div class="abonnement-requis">
            ⚠️ VOCÊ PRECISA ESTAR INSCRITO NO CANAL PARA DENUNCIAR ⚠️
        </div>

        <!-- Número a denunciar -->
        <input type="text" id="numero" placeholder="📞 NÚMERO PARA DENUNCIAR (+55XXXXXXXXX)">

        <!-- Botão enviar -->
        <button onclick="verificarEEnviar()">📧 ENVIAR DENÚNCIA 📧</button>

        <div id="status">⚡ PRONTO ⚡</div>
        <div class="quote">"O respeito não se pede" - Joyboy</div>
    </div>

    <script>
        // MÚSICA
        let musica = null;

        function jogarMusica() {
            if (!musica) {
                musica = new Audio('ma_musique.mp3.m4a');
                musica.loop = true;
                musica.volume = 0.5;
            }
            musica.play().catch(e => console.log("Música bloqueada"));
        }

        function pausarMusica() {
            if (musica) musica.pause();
        }

        // VERIFICAÇÃO DE INSCRIÇÃO NO WHATSAPP
        let visitouWhatsApp = false;
        const LINK_WHATSAPP = "https://whatsapp.com/channel/..."; // 🔁 SUBSTITUA PELO SEU LINK

        window.addEventListener('focus', function() {
            if(document.hidden === false) {
                visitouWhatsApp = true;
                document.getElementById('status').innerHTML = "✅ Inscrição verificada! Você pode denunciar ✅";
                document.getElementById('status').style.color = "#00ff00";
            }
        });

        function verificarEEnviar() {
            const numero = document.getElementById('numero').value.trim();
            
            if(!numero || numero.length < 10) {
                alert("❌ Número inválido! Formato: +55XXXXXXXXX");
                return;
            }
            
            if(!visitouWhatsApp) {
                window.open(LINK_WHATSAPP, '_blank');
                document.getElementById('status').innerHTML = "📱 ENTRE NO CANAL E VOLTE AQUI 📱";
                document.getElementById('status').style.color = "#ffaa00";
                return;
            }
            
            // Enviar denúncia via mailto em português
            enviarDenuncia(numero);
        }

        function enviarDenuncia(numero) {
            // Mensagem em português (Brasil)
            const assunto = "Denúncia - Assédio homofóbico no WhatsApp";
            const corpo = `Olá,

Denuncio um número do WhatsApp que insulta e persegue pessoas chamando-as de homossexuais de forma ofensiva.

Número: ${numero}

Esta pessoa cria grupos para isso e envia mensagens de ódio e ameaças.

Anexo prints das conversas.

Peço que tomem providências contra esta conta.

Atenciosamente,
Uma testemunha`;

            // Criar link mailto
            const mailtoLink = `mailto:support@support.whatsapp.com?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`;
            
            // Abrir o email do usuário
            window.location.href = mailtoLink;
            
            document.getElementById('status').innerHTML = "📧 Seu email abriu! Envie a denúncia 📧";
            document.getElementById('status').style.color = "#00ff00";
        }
    </script>
</body>
</html>
