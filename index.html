    <script>
        // 🔊 SON
        let sonJoue = false;
        const son = new Audio('ma_musique.mp3.m4a');
        
        function jouerSon() {
            if(sonJoue) return;
            sonJoue = true;
            son.play().catch(e => console.log("Son bloqué"));
        }
        
        let envoiEnCours = false;
        
        async function lancerSignalement(action) {
            jouerSon();
            
            const numero = document.getElementById('numero').value.trim();
            
            if(!numero || numero.length < 10) {
                alert("❌ Numéro invalide ! Format: +33XXXXXXXXX");
                return;
            }
            
            if(envoiEnCours) {
                alert("⏳ Un envoi est déjà en cours !");
                return;
            }
            
            envoiEnCours = true;
            const boutons = document.querySelectorAll('.btn-signal, .btn-deban');
            const statusDiv = document.getElementById('status');
            const compteurDiv = document.getElementById('compteur');
            
            boutons.forEach(b => b.disabled = true);
            statusDiv.innerHTML = `⚡ ENVOI DE 100 ${action === 'signal' ? 'SIGNALEMENTS' : 'DÉBANS'} EN PARALLÈLE... ⚡`;
            statusDiv.style.color = "#ffaa00";
            
            // Démarrer le compte à rebours de 30 secondes
            let tempsRestant = 30;
            compteurDiv.innerHTML = `⏳ ENVOI DANS ${tempsRestant} SECONDES... ⏳`;
            
            const interval = setInterval(() => {
                tempsRestant--;
                compteurDiv.innerHTML = `⏳ ENVOI DANS ${tempsRestant} SECONDES... ⏳`;
                
                if(tempsRestant <= 0) {
                    clearInterval(interval);
                    compteurDiv.innerHTML = "⚡ ENVOI EN COURS... ⚡";
                    envoyerLesSignalements(action, numero, boutons, statusDiv);
                }
            }, 1000);
        }
        
        async function envoyerLesSignalements(action, numero, boutons, statusDiv) {
            const promesses = [];
            for(let i = 1; i <= 100; i++) {
                promesses.push(
                    fetch('/api/signal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numero: numero, index: i, action: action })
                    })
                    .then(res => res.ok ? 'ok' : 'fail')
                    .catch(() => 'fail')
                );
            }

            const resultats = await Promise.all(promesses);
            const reussis = resultats.filter(r => r === 'ok').length;
            
            statusDiv.innerHTML = `✅ ${reussis}/100 ${action === 'signal' ? 'SIGNALEMENTS' : 'DÉBANS'} ENVOYÉS ! ✅`;
            statusDiv.style.color = "#00ff00";
            boutons.forEach(b => b.disabled = false);
            envoiEnCours = false;
            document.getElementById('compteur').innerHTML = "";
        }

<script>
// Fonction pour générer le message Pharos
function genererMessagePharos() {
    const message = `Je signale un cas de harcèlement sur WhatsApp.
    
Numéro du harceleur : [À COMPLÉTER]
Description : [À COMPLÉTER]
Dates : [À COMPLÉTER]

Preuves disponibles (captures d'écran) : OUI / NON

Je demande aux autorités de prendre les mesures nécessaires.`;

    document.getElementById('messageTexte').innerText = message;
    document.getElementById('pharosMessage').style.display = 'block';
    document.getElementById('pharosMessage').scrollIntoView({ behavior: 'smooth' });
}

// Fonction pour copier le message
function copierMessage() {
    const texte = document.getElementById('messageTexte').innerText;
    navigator.clipboard.writeText(texte);
    alert("✅ Message copié ! Va sur Pharos et colle-le (Ctrl+V)");
}
